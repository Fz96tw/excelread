version: "3.9"

name: excelread-app

services:

  redis:
      image: redis:7
      #container_name: redis
      ports:
        - "6379:6379"
      networks:
        - appnet

  file_watcher:
    image: file_watcher:latest
    container_name: file_watcher
    command: python file_watcher.py
    environment:
      - REDIS_HOST=redis  # <-- Add this
    volumes:
      #- .:/app              # needs docs.yaml + code
      - /home/nadeem/github/excelread/config:/app/config
      - /c:/mnt/c
      - /home/nadeem/github/excelread/logs:/app/logs
    networks:
      - appnet
    depends_on:
      - redis
    
  resync_worker:
    image: vector_worker:latest
    container_name: resync_worker
    command: celery -A vector_worker worker -n resync@%h --loglevel=INFO --concurrency=1 -Q resync_queue --prefetch-multiplier=1
    environment:
      - REDIS_HOST=redis
      - SUMMARIZER_HOST=http://summarizer:8000
    volumes:
      - /home/nadeem/github/excelread/config:/app/config
      - /c:/mnt/c
      - /home/nadeem/github/excelread/logs:/app/logs
#      - /home/nadeem/github/excelread/config:/app/config_local
    networks:
      - appnet
    depends_on:
      - redis


  url_worker:
    image: vector_worker:latest
    container_name: url_worker
    command: celery -A vector_worker worker -n url@%h --loglevel=INFO --concurrency=1 -Q url_processing_queue --prefetch-multiplier=1
    environment:
      - REDIS_HOST=redis
      - SUMMARIZER_HOST=http://summarizer:8000
    volumes:
      - /home/nadeem/github/excelread/config:/app/config
      - /c:/mnt/c
      - /home/nadeem/github/excelread/logs:/app/logs
  #    - /home/nadeem/github/excelread/config:/app/config_local
    networks:
      - appnet
    depends_on:
      - redis

  ollama:
    image: fz96tw/llama3.2-1b:v1
    container_name: llama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - appnet

  ai-connector:
    image: ai-connector:latest
    container_name: ai-connector
    ports:
      - "5000:5000"
    depends_on:
      - summarizer
    networks:
      - appnet
    volumes:
      #- config:/appnew/config
      - /home/nadeem/github/excelread/config:/appnew/config
      - /c:/mnt/c
      - /home/nadeem/github/excelread/logs:/appnew/logs
      #- /home/nadeem/github/excelread/config:/appnew/config_local  # just so i can write contactus.messages.txt
    environment:
      - SUMMARIZER_HOST=http://summarizer:8000
      - REDIS_HOST=redis  # <-- Add this so ai-connector can publish tasks to Redis for vector_worker


  # Independent scheduler service
  scheduler:
    image: scheduler:latest
    container_name: scheduler
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    volumes:
      #- config:/scheduler/config  # Shared config directory
      - /home/nadeem/github/excelread/config:/scheduler/config
      - /home/nadeem/github/excelread/logs:/scheduler/logs    
    environment:
      #- AUTH=user_auth
      #- PYTHONUNBUFFERED=1
      - APPNEW_HOST=http://ai-connector:5000
    restart: unless-stopped
    depends_on:
      - ai-connector
    networks:
      - appnet


  summarizer:
    image: summarizer
    container_name: summarizer
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - appnet
    volumes:
     # - config:/summarizer/config
      - /home/nadeem/github/excelread/config:/summarizer/config
    environment:
      - OLLAMA_HOST=http://ollama:11434

  mcpserver:
    image: mcpserver:latest
    container_name: mcpserver
    ports:
      - "5050:5050"
    networks:
      - appnet
    volumes:
      - /home/nadeem/github/excelread/config:/appnew/config
      - /home/nadeem/github/excelread/logs:/appnew/logs
    environment:
      - PORT=5050


networks:
  appnet:
    name: appnet      # <-- must match exactly
    driver: bridge


  

  